<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Nexus logo mark">
  <defs>
    <linearGradient id="nexusBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <radialGradient id="nexusHub" cx="32" cy="32" r="9" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </radialGradient>
    <filter id="nexusGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect width="64" height="64" rx="14" fill="url(#nexusBg)"/>

  <!-- subtle top highlight -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#FFFFFF" stroke-opacity="0.18"/>

  <!-- connections from hub → satellites -->
  <g stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="32" x2="16.5" y2="18"/>
    <line x1="32" y1="32" x2="47.5" y2="18"/>
    <line x1="32" y1="32" x2="32"   y2="49"/>
  </g>

  <!-- satellite nodes (NGOs, hosts, partners) -->
  <g fill="#FFFFFF">
    <circle cx="16.5" cy="18" r="4.2"/>
    <circle cx="47.5" cy="18" r="4.2"/>
    <circle cx="32"   cy="49" r="4.2"/>
  </g>

  <!-- central hub -->
  <circle cx="32" cy="32" r="9" fill="url(#nexusHub)" filter="url(#nexusGlow)" opacity="0.35"/>
  <circle cx="32" cy="32" r="7.5" fill="#FFFFFF"/>
  <circle cx="32" cy="32" r="3.2" fill="#1D4ED8"/>
</svg>
